<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZeiTerm</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <aside class="sidebar">
        <h2>ZeiTerm</h2>
        <ul>
            <li>Link</li>
            <li>Custom your bio</li>
            <li>Design</li>
        </ul>
    </aside>

    <main class="terminal-container">
        <div class="terminal-header">

            <div class="buttons">
                <span class="close"></span>
                <span class="minimize"></span>
                <span class="maximize"></span>
            </div>

            <div class="title">Terminal</div>
            
            <label for="upload-btn" class="custom-upload">Upload Img</label>
            <input type="file" id="upload-btn" accept="image/*" style="display: none;">
        </div>

        <div class="terminal-body">

            <div class="terminal-line">
                <span class="prompt">user@ZeiTerm_Bio:~$ </span>
                <input type="text" id="terminal-input" autofocus autocomplete="off">
            </div>

            <div>
                <pre id="ascii-display" style="font-family: monospace; line-height: 6px; font-size: 6px; color: #a855f7;"></pre>
            </div>

        </div>
    </main>

    <script src="../js/index.js"></script>
</body>
</html>
