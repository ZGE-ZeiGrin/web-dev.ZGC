<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../css/authstyle.css">
    <title>Login Page</title>
</head>
<body>
    <main class="login-container">
        <h1>Welcome back, User 👋</h1>

        <div class="auth-card" id="login-card">

            <div class="auth-field-group">
                <label class="auth-label" for="login-username">Username</label>
                <input class="auth-input" id="login-username" type="text" placeholder="Enter your User">
            </div>

            <div class="auth-field-group">
                <label class="auth-label" for="login-password">Password</label>
                <input class="auth-input" id="login-password" type="password" placeholder="Enter your Password">
            </div>

                <a href="#" class="forgot-link">Forgot password?</a>
                <button type="submit" class="btn-main">Login</button>
                <p class="switch-text">Don't have account yet? <a href="#" id="to-signup">Sign up now</a></p>

        </div>

        <div class="auth-card hidden" id="signup-card">

            <div class="auth-field-group">
                <label class="auth-label" for="reg-username">Username</label>
                <input class="auth-input" id="reg-username" type="text" placeholder="create your username">
            </div>

            <div class="auth-field-group">
                <label class="auth-label" for="reg-email">Your Email</label>
                <input class="auth-input" id="reg-email" type="email" placeholder="Enter your email">
            </div>

            <div class="auth-field-group">
                <label class="auth-label" for="reg-password">Password</label>
                <input class="auth-input" id="reg-password" type="password" placeholder="create your password">
            </div>

            <div class="auth-field-group">
                <label class="auth-label" for="cofirm-password">Cofirm Password</label>
                <input class="auth-input" id="cofirm-password" type="password" placeholder="Enter your password">
            </div>

            <button type="submit" class="btn-main">Sign up</button>

            <div class="separator"><span>or</span></div>

            <button type="button" class="btn-try"> TRY it free</button>

            <p class="switch-text">Do you have already have an account? <a href="#" id="to-login">Login here</a></p>

        </div>
    </main>
    <script src="../../js/auth.js"></script>
</body>
</html>
